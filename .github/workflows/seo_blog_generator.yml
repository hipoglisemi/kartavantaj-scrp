name: SEO Blog Auto-Generator

on:
  schedule:
    # Pazartesi, Çarşamba ve Cuma günleri Türkiye saati ile 10:00'da çalışır (UTC 07:00)
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch: # Manuel tetikleme (Test için)

jobs:
  generate-seo-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv psycopg2-binary python-slugify

      - name: Run SEO Blog Generator AI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_seo_blog.py
