name: "🧠 Smart Classifier"
# Sektör/marka sınıflandırması ve tarih tamamlama
# URL açmadan, sadece veritabanındaki mevcut alanları kullanır
# TSİ 05:30 → UTC 02:30 (scraper'lar bittikten, quality autofix'ten önce)

on:
  schedule:
    - cron: '30 2 * * *'   # TSİ 05:30 (UTC 02:30)
  workflow_dispatch:

jobs:
  classify:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Smart Classifier
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
        GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
        GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PYTHONPATH: ${{ github.workspace }}
        PYTHONUNBUFFERED: '1'
      run: |
        python smart_classify.py
