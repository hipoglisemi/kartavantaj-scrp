name: Data Quality Auto-Fixer

on:
  schedule:
    # TSİ 07:00 → UTC 04:00 — günde 1 kere
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (Chrome & Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Quality Auto-Fixer
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_MODEL: "gemini-2.0-flash-lite"
        USE_VERTEX_AI: "False"
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python data_quality_autofix.py
